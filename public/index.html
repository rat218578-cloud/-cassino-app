<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Studio - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #0a0c12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: linear-gradient(145deg, #13161f, #0b0e16);
            border-radius: 32px;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(0, 230, 118, 0.25);
        }
        .login-card h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #00e676, #00b0f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .login-card input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #0c0f17;
            border: 1px solid #252b3a;
            border-radius: 28px;
            color: white;
        }
        .login-card button {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: linear-gradient(105deg, #00b248, #00e676);
            border: none;
            border-radius: 60px;
            color: #0a0c12;
            font-weight: bold;
            cursor: pointer;
        }
        .login-card button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .error-msg { color: #ff7a7a; margin-top: 12px; font-size: 0.8rem; }
        .success-msg { color: #00e676; margin-top: 12px; }
        .game-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            z-index: 100;
        }
        .game-frame.active { display: block; }
        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #1e2332cc;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            display: none;
            z-index: 101;
        }
        .back-btn.active { display: block; }
        .captcha-container {
            margin: 15px 0;
        }
    </style>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>

    <div id="loginBox" class="login-card">
        <h1>⚽ Football Studio</h1>
        <p style="color: #9aa3b8; margin: 8px 0 20px;">Sinais em Tempo Real</p>
        
        <input type="email" id="email" placeholder="Email da Sorte na Bet">
        <input type="password" id="password" placeholder="Senha">
        
        <div class="captcha-container">
            <div class="cf-turnstile" data-sitekey="0x4AAAAAAAykd8yJm3kQzNJc" data-callback="onCaptchaSuccess"></div>
        </div>
        
        <button id="loginBtn" disabled>🎮 ENTRAR E JOGAR</button>
        
        <div id="messageArea"></div>
    </div>

    <button id="backBtn" class="back-btn" onclick="resetGame()">← Voltar</button>

    <iframe id="gameFrame" class="game-frame"></iframe>

    <script>
        let currentCaptchaToken = null;
        let currentEmail = null;
        let currentAccessToken = null;

        function onCaptchaSuccess(token) {
            currentCaptchaToken = token;
            document.getElementById('loginBtn').disabled = false;
            document.getElementById('messageArea').innerHTML = '<div class="success-msg">✅ Captcha resolvido! Clique em Entrar.</div>';
        }

        async function doLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageArea = document.getElementById('messageArea');
            const loginBox = document.getElementById('loginBox');
            
            if (!email || !password) {
                messageArea.innerHTML = '<div class="error-msg">⚠️ Preencha email e senha</div>';
                return;
            }
            
            if (!currentCaptchaToken) {
                messageArea.innerHTML = '<div class="error-msg">⚠️ Resolva o captcha primeiro</div>';
                return;
            }
            
            messageArea.innerHTML = '<div class="success-msg">🔄 Autenticando...</div>';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: email, 
                        password: password,
                        captcha_token: currentCaptchaToken
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentEmail = email;
                    currentAccessToken = data.access_token;
                    
                    messageArea.innerHTML = '<div class="success-msg">✅ Login realizado! Carregando jogo...</div>';
                    
                    const gameResponse = await fetch('/api/game-url', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email, access_token: currentAccessToken })
                    });
                    
                    const gameData = await gameResponse.json();
                    
                    if (gameData.success && gameData.gameURL) {
                        const iframe = document.getElementById('gameFrame');
                        iframe.src = gameData.gameURL;
                        iframe.classList.add('active');
                        loginBox.style.display = 'none';
                        document.getElementById('backBtn').classList.add('active');
                    } else {
                        messageArea.innerHTML = '<div class="error-msg">❌ Falha ao carregar o jogo</div>';
                    }
                    
                } else {
                    messageArea.innerHTML = '<div class="error-msg">❌ ' + (data.error || 'Falha na autenticação') + '</div>';
                }
                
            } catch (error) {
                console.error('Erro:', error);
                messageArea.innerHTML = '<div class="error-msg">❌ Erro de conexão com o servidor</div>';
            }
        }

        function resetGame() {
            document.getElementById('gameFrame').classList.remove('active');
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('backBtn').classList.remove('active');
            document.getElementById('loginBtn').disabled = true;
            currentCaptchaToken = null;
            
            if (window.turnstile) {
                turnstile.reset();
            }
        }

        const savedEmail = localStorage.getItem('user_email');
        if (savedEmail) {
            document.getElementById('email').value = savedEmail;
        }

        document.getElementById('loginBtn').onclick = doLogin;
    </script>

</body>
</html>
