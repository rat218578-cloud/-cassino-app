<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorte na Bet - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c12;
            overflow: hidden;
            height: 100vh;
        }
        
        /* Iframe do jogo */
        .game-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        
        /* Overlay de login */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s;
        }
        
        .login-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        .login-card {
            background: linear-gradient(145deg, #13161f, #0b0e16);
            border-radius: 48px;
            padding: 2.5rem;
            width: 90%;
            max-width: 440px;
            border: 1px solid rgba(0, 230, 118, 0.3);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
        }
        
        .login-card h1 {
            font-size: 2.3rem;
            background: linear-gradient(135deg, #00e676, #00b0f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .input-group {
            margin-bottom: 1rem;
        }
        
        .input-group label {
            display: block;
            color: #b0bbd4;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: #0c0f17;
            border: 1.5px solid #252b3a;
            border-radius: 28px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        
        .input-group input:focus {
            border-color: #00e676;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            margin-top: 1rem;
            background: linear-gradient(105deg, #00b248, #00e676);
            border: none;
            border-radius: 60px;
            color: #0a0c12;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        
        .message {
            margin-top: 1rem;
            padding: 10px;
            border-radius: 30px;
            text-align: center;
            font-size: 0.85rem;
        }
        
        .error {
            background: rgba(255, 70, 70, 0.2);
            color: #ff7a7a;
        }
        
        .success {
            background: rgba(0, 230, 118, 0.2);
            color: #6ef0a0;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
            color: #00e676;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #252b3a;
            border-top-color: #00e676;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00e676;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 1001;
            display: none;
        }
        
        .back-btn.active {
            display: block;
        }
    </style>
</head>
<body>
    <iframe id="gameFrame" class="game-iframe" src="about:blank"></iframe>
    
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h1>SORTE NA BET</h1>
            <div class="input-group">
                <label>📧 E-MAIL</label>
                <input type="email" id="email" placeholder="seu@email.com">
            </div>
            <div class="input-group">
                <label>🔒 SENHA</label>
                <input type="password" id="senha" placeholder="••••••••">
            </div>
            <button class="login-btn" id="loginBtn">ENTRAR E JOGAR</button>
            <div id="message" class="message"></div>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <div>Autenticando...</div>
            </div>
        </div>
    </div>
    
    <button id="backBtn" class="back-btn" onclick="voltarLogin()">← Voltar / Trocar conta</button>

    <script>
        // Verifica se já tem sessão ativa
        async function verificarSessao() {
            try {
                const response = await fetch('/api/check-session');
                const data = await response.json();
                
                if (data.valid) {
                    console.log('✅ Sessão encontrada, carregando jogo...');
                    carregarJogo();
                } else {
                    console.log('⚠️ Sem sessão ativa, mostrar login');
                }
            } catch (error) {
                console.error('Erro ao verificar sessão:', error);
            }
        }
        
        async function carregarJogo() {
            try {
                const response = await fetch('/api/game-url');
                const data = await response.json();
                
                if (data.url) {
                    document.getElementById('gameFrame').src = data.url;
                    document.getElementById('loginOverlay').classList.add('hidden');
                    document.getElementById('backBtn').classList.add('active');
                }
            } catch (error) {
                console.error('Erro ao carregar jogo:', error);
            }
        }
        
        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const messageDiv = document.getElementById('message');
            const loadingDiv = document.getElementById('loading');
            const loginBtn = document.getElementById('loginBtn');
            
            if (!email || !senha) {
                messageDiv.innerHTML = '<div class="message error">Preencha email e senha</div>';
                return;
            }
            
            messageDiv.innerHTML = '';
            loadingDiv.classList.add('active');
            loginBtn.disabled = true;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.innerHTML = '<div class="message success">✅ Login realizado! Carregando jogo...</div>';
                    setTimeout(() => {
                        carregarJogo();
                    }, 1000);
                } else {
                    messageDiv.innerHTML = `<div class="message error">❌ Erro: ${data.error}</div>`;
                }
            } catch (error) {
                messageDiv.innerHTML = `<div class="message error">❌ Erro de conexão: ${error.message}</div>`;
            } finally {
                loadingDiv.classList.remove('active');
                loginBtn.disabled = false;
            }
        }
        
        async function voltarLogin() {
            await fetch('/api/logout', { method: 'POST' });
            document.getElementById('gameFrame').src = 'about:blank';
            document.getElementById('loginOverlay').classList.remove('hidden');
            document.getElementById('backBtn').classList.remove('active');
            document.getElementById('email').value = '';
            document.getElementById('senha').value = '';
            document.getElementById('message').innerHTML = '';
        }
        
        document.getElementById('loginBtn').addEventListener('click', fazerLogin);
        document.getElementById('email').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fazerLogin();
        });
        document.getElementById('senha').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fazerLogin();
        });
        
        // Inicializa
        verificarSessao();
    </script>
</body>
</html>
