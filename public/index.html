<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sorte na Bet - Football Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0c12;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        .game-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
            background: #0a0f1a;
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 0, 0, 0.95), rgba(8, 12, 24, 0.98));
            backdrop-filter: blur(14px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0.4s;
        }

        .login-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .login-card {
            background: linear-gradient(145deg, #13161f, #0b0e16);
            border-radius: 48px;
            padding: 2.2rem 2rem 2.5rem;
            width: 90%;
            max-width: 440px;
            text-align: center;
            border: 1px solid rgba(0, 230, 118, 0.25);
            box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 230, 118, 0.1) inset;
        }

        .login-card h1 {
            font-size: 2.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #E6F7FF, #00E676, #00B0F0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }

        .badge-cash {
            display: inline-block;
            background: rgba(0, 230, 118, 0.15);
            border-radius: 100px;
            padding: 6px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #00e676;
            border: 0.5px solid rgba(0,230,118,0.4);
            margin-bottom: 1rem;
        }

        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b9c2d9;
            margin-bottom: 6px;
            margin-left: 8px;
        }

        .login-card input {
            width: 100%;
            padding: 15px 18px;
            background: #0c0f17;
            border: 1.5px solid #252b3a;
            border-radius: 28px;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s;
            outline: none;
        }

        .login-card input:focus {
            border-color: #00e676;
            box-shadow: 0 0 0 3px rgba(0, 230, 118, 0.25);
            background: #11141e;
        }

        .login-card input::placeholder {
            color: #4a5269;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            margin-top: 8px;
            background: linear-gradient(105deg, #00b248, #00e676);
            border: none;
            border-radius: 60px;
            color: #0a0c12;
            font-weight: 800;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 8px 18px rgba(0, 230, 118, 0.2);
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 12px 24px rgba(0, 230, 118, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .message-area {
            margin-top: 18px;
            min-height: 48px;
        }

        .error-msg {
            background: rgba(255, 70, 70, 0.12);
            backdrop-filter: blur(4px);
            color: #ff7a7a;
            padding: 10px;
            border-radius: 40px;
            font-size: 0.8rem;
            border: 1px solid rgba(255,70,70,0.3);
        }

        .success-msg {
            background: rgba(0, 230, 118, 0.12);
            color: #6ef0a0;
            padding: 10px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .info-msg {
            background: rgba(0, 150, 230, 0.12);
            color: #6ec8f0;
            padding: 10px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .loading {
            display: none;
            margin: 16px auto 0;
        }

        .loading.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #252b3a;
            border-top-color: #00e676;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .captcha-status {
            font-size: 0.7rem;
            color: #888;
            text-align: center;
            margin-top: 10px;
            padding: 5px;
        }

        .back-btn {
            position: fixed;
            bottom: 24px;
            left: 24px;
            background: #1e2332cc;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,230,118,0.4);
            padding: 10px 22px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            z-index: 1002;
            font-size: 0.85rem;
            display: none;
        }

        .back-btn.active {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .back-btn:hover {
            background: #ff4444cc;
            border-color: #ff8888;
        }

        .token-info {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            color: #666;
            z-index: 1001;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <iframe id="casinoFrame" class="game-iframe" src="about:blank"></iframe>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h1>SORTEBET</h1>
            <div class="badge-cash">🎰 Football Studio Dice</div>

            <div class="input-group">
                <label>📧 E-MAIL</label>
                <input type="email" id="username" placeholder="seuemail@exemplo.com" value="gcriste268@gmail.com" autocomplete="off">
            </div>
            <div class="input-group">
                <label>🔒 SENHA</label>
                <input type="password" id="password" placeholder="••••••••" value="284050">
            </div>

            <div id="captchaContainer"></div>
            <div id="captchaStatus" class="captcha-status">⏳ Aguardando captcha...</div>

            <button class="login-btn" id="loginBtn" disabled>🎰 ENTRAR E JOGAR</button>

            <div id="messageArea" class="message-area"></div>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <span style="color:#b0bbd4; font-size:0.8rem;">Validando credenciais...</span>
            </div>
        </div>
    </div>

    <button id="backBtn" class="back-btn">← VOLTAR / TROCAR CONTA</button>
    <div id="tokenInfo" class="token-info"></div>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" crossorigin="anonymous"></script>
    
    <script>
        let turnstileToken = null;
        let isCaptchaReady = false;
        let currentSessionId = localStorage.getItem('session_id');
        
        const loginBtn = document.getElementById('loginBtn');
        const captchaStatus = document.getElementById('captchaStatus');
        const overlay = document.getElementById('loginOverlay');
        const backBtn = document.getElementById('backBtn');
        const casinoFrame = document.getElementById('casinoFrame');
        const messageArea = document.getElementById('messageArea');
        const loadingDiv = document.getElementById('loading');
        const tokenInfo = document.getElementById('tokenInfo');

        function showMessage(text, type) {
            messageArea.innerHTML = `<div class="${type}-msg">${text}</div>`;
            setTimeout(() => {
                if (messageArea.innerHTML === `<div class="${type}-msg">${text}</div>`) {
                    messageArea.innerHTML = '';
                }
            }, 5000);
        }

        function updateTokenInfo(expiresAt) {
            if (expiresAt) {
                const remaining = Math.max(0, Math.floor((expiresAt - Date.now()) / 1000 / 60 / 60 / 24));
                tokenInfo.innerHTML = `🔑 Token válido por mais ${remaining} dias | ${new Date(expiresAt).toLocaleDateString()}`;
            } else {
                tokenInfo.innerHTML = '';
            }
        }

        // Inicializa Turnstile
        function initTurnstile() {
            if (typeof turnstile === 'undefined') {
                console.log('⏳ Aguardando Turnstile carregar...');
                setTimeout(initTurnstile, 500);
                return;
            }

            console.log('✅ Turnstile disponível, renderizando...');
            
            turnstile.ready(function() {
                turnstile.render('#captchaContainer', {
                    sitekey: '0x4AAAAAAAykd8yJm3kQzNJc',
                    callback: function(token) {
                        turnstileToken = token;
                        isCaptchaReady = true;
                        loginBtn.disabled = false;
                        captchaStatus.innerHTML = '✅ Captcha resolvido!';
                        captchaStatus.style.color = '#6ef0a0';
                        console.log('✅ Captcha resolvido:', token.substring(0, 30) + '...');
                    },
                    'expired-callback': function() {
                        console.log('⚠️ Captcha expirou');
                        turnstileToken = null;
                        isCaptchaReady = false;
                        loginBtn.disabled = true;
                        captchaStatus.innerHTML = '⚠️ Captcha expirado, resolva novamente';
                        captchaStatus.style.color = '#ff7a7a';
                    },
                    'error-callback': function() {
                        console.log('❌ Erro no captcha');
                        captchaStatus.innerHTML = '❌ Erro no captcha, tente novamente';
                        captchaStatus.style.color = '#ff7a7a';
                    }
                });
            });
        }

        // Carregar jogo via backend
        async function carregarJogo() {
            console.log('🎮 Carregando jogo...');
            showMessage('Iniciando jogo...', 'info');
            
            try {
                const response = await fetch('/api/cassino/start-game', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        session_id: currentSessionId,
                        game_slug: 'evolution/football-studio-dice'
                    })
                });
                
                const data = await response.json();
                console.log('📥 Resposta start-game:', data);
                
                if (data.success) {
                    console.log('✅ URL do jogo:', data.game_url);
                    casinoFrame.src = data.game_url;
                    overlay.classList.add('hidden');
                    backBtn.classList.add('active');
                } else {
                    console.error('❌ Erro ao iniciar jogo:', data.error);
                    showMessage(data.error || 'Erro ao iniciar jogo', 'error');
                    overlay.classList.remove('hidden');
                }
            } catch (error) {
                console.error('❌ Erro:', error);
                showMessage('Erro de conexão com o servidor', 'error');
            }
        }

        // Verificar sessão existente
        async function verificarSessao() {
            if (!currentSessionId) {
                console.log('❌ Sem session_id');
                overlay.classList.remove('hidden');
                return false;
            }
            
            console.log('🔍 Verificando sessão:', currentSessionId.substring(0, 16) + '...');
            
            try {
                const response = await fetch('/api/cassino/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: currentSessionId })
                });
                
                const data = await response.json();
                console.log('📥 Resposta verify:', data);
                
                if (data.valid) {
                    console.log('✅ Sessão válida!');
                    updateTokenInfo(data.expires_at);
                    await carregarJogo();
                    return true;
                } else {
                    console.log('⚠️ Sessão inválida');
                    localStorage.removeItem('session_id');
                    currentSessionId = null;
                    overlay.classList.remove('hidden');
                }
            } catch (error) {
                console.error('❌ Erro ao verificar sessão:', error);
                overlay.classList.remove('hidden');
            }
            return false;
        }

        // Fazer login
        async function fazerLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            console.log('📝 Tentando login para:', username);
            
            if (!username || !password) {
                showMessage('Preencha email e senha', 'error');
                return;
            }
            
            if (!turnstileToken || !isCaptchaReady) {
                showMessage('Complete o captcha "Não sou um robô" primeiro', 'error');
                captchaStatus.innerHTML = '⚠️ Marque o captcha acima';
                captchaStatus.style.color = '#ff7a7a';
                return;
            }
            
            loginBtn.disabled = true;
            loadingDiv.classList.add('active');
            messageArea.innerHTML = '';
            
            try {
                console.log('📡 Enviando login para o backend...');
                
                const response = await fetch('/api/cassino/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: username,
                        password: password,
                        captcha_token: turnstileToken
                    })
                });
                
                const data = await response.json();
                console.log('📥 Resposta login:', data);
                
                if (data.success) {
                    console.log('✅ Login bem-sucedido!');
                    currentSessionId = data.session_id;
                    localStorage.setItem('session_id', currentSessionId);
                    localStorage.setItem('user_email', username);
                    
                    updateTokenInfo(data.expires_at);
                    showMessage('Login realizado! Carregando jogo...', 'success');
                    
                    setTimeout(() => {
                        carregarJogo();
                    }, 1500);
                } else {
                    console.error('❌ Falha no login:', data.error);
                    showMessage(data.error || 'Falha no login', 'error');
                    if (typeof turnstile !== 'undefined') turnstile.reset();
                    turnstileToken = null;
                    isCaptchaReady = false;
                    loginBtn.disabled = true;
                    captchaStatus.innerHTML = '⏳ Resolva o captcha novamente';
                    captchaStatus.style.color = '#888';
                }
            } catch (error) {
                console.error('❌ Erro de rede:', error);
                showMessage('Erro de conexão: ' + error.message, 'error');
            } finally {
                loadingDiv.classList.remove('active');
                if (isCaptchaReady) loginBtn.disabled = false;
            }
        }

        // Resetar para tela de login
        function resetToLogin() {
            casinoFrame.src = 'about:blank';
            overlay.classList.remove('hidden');
            backBtn.classList.remove('active');
            localStorage.removeItem('session_id');
            currentSessionId = null;
            if (typeof turnstile !== 'undefined') turnstile.reset();
            turnstileToken = null;
            isCaptchaReady = false;
            loginBtn.disabled = true;
            captchaStatus.innerHTML = '⏳ Aguardando captcha...';
            captchaStatus.style.color = '#888';
            messageArea.innerHTML = '';
            tokenInfo.innerHTML = '';
        }

        // Adiciona os eventos de clique
        loginBtn.addEventListener('click', fazerLogin);
        backBtn.addEventListener('click', resetToLogin);
        
        // Inicializar
        initTurnstile();
        verificarSessao();
    </script>
</body>
</html>
