<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Studio - Login Evolution</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            min-height: 100vh;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: rgba(30,30,46,0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .login-box h1 {
            background: linear-gradient(135deg, #00cc66, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .login-box p {
            color: #888;
            margin-bottom: 24px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #00cc66;
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: linear-gradient(135deg, #00cc66, #009944);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.5;
        }
        .error {
            color: #ff4444;
            margin-top: 12px;
            font-size: 14px;
        }
        .loading {
            display: none;
            margin-top: 16px;
        }
        .loading.active {
            display: block;
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #2a2a3e;
            border-top-color: #00cc66;
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .game-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            z-index: 100;
        }
        .game-frame.active {
            display: block;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #2a2a3e;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            z-index: 101;
            display: none;
        }
        .back-btn.active {
            display: block;
        }
    </style>
</head>
<body>

<!-- SEU FORMULÁRIO -->
<div id="loginBox" class="login-box">
    <h1>⚽ Football Studio</h1>
    <p>Sinais em Tempo Real - Evolution Gaming</p>
    
    <input type="email" id="email" placeholder="Email da Sorte na Bet">
    <input type="password" id="password" placeholder="Senha">
    
    <button id="loginBtn" onclick="doLogin()">🎮 Entrar e Jogar</button>
    
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p style="margin-top: 8px;">Autenticando...</p>
    </div>
    
    <div id="errorMsg" class="error"></div>
</div>

<button id="backBtn" class="back-btn" onclick="backToLogin()">← Voltar</button>

<iframe id="gameFrame" class="game-frame" allow="autoplay; fullscreen"></iframe>

<script>
    async function doLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const loginBtn = document.getElementById('loginBtn');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        
        if (!email || !password) {
            errorMsg.innerText = 'Preencha email e senha';
            return;
        }
        
        errorMsg.innerText = '';
        loginBtn.disabled = true;
        loading.classList.add('active');
        
        try {
            // Chama SEU BACKEND
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            
            const data = await response.json();
            
            if (data.success && data.iframeUrl) {
                // Esconde formulário e mostra o jogo
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('gameFrame').src = data.iframeUrl;
                document.getElementById('gameFrame').classList.add('active');
                document.getElementById('backBtn').classList.add('active');
                
                // Conecta WebSocket de sinais
                connectWebSocket();
            } else {
                errorMsg.innerText = data.error || 'Email ou senha inválidos';
                loginBtn.disabled = false;
            }
        } catch (error) {
            errorMsg.innerText = 'Erro de conexão com o servidor';
            loginBtn.disabled = false;
        } finally {
            loading.classList.remove('active');
        }
    }
    
    function backToLogin() {
        document.getElementById('gameFrame').classList.remove('active');
        document.getElementById('loginBox').style.display = 'block';
        document.getElementById('backBtn').classList.remove('active');
        if (ws) ws.close();
    }
    
    let ws = null;
    
    function connectWebSocket() {
        ws = new WebSocket('wss://apiglobal.appbackend.tech/ws/signals/entrance/football-studio');
        ws.onopen = () => console.log('✅ Sinais conectados');
        ws.onmessage = (e) => console.log('📡 Sinal:', e.data);
        ws.onerror = (e) => console.error('WebSocket error:', e);
    }
</script>

</body>
</html>
