<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorte na Bet - Jogo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #0a0c12; height: 100vh; overflow: hidden; }
        .game-frame { width: 100%; height: 100%; border: none; }
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            transition: 0.3s;
        }
        .login-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .login-card {
            background: linear-gradient(145deg, #13161f, #0b0e16);
            border-radius: 40px; padding: 2rem; width: 90%; max-width: 400px;
            border: 1px solid #00e676;
        }
        .login-card h1 { color: #00e676; text-align: center; margin-bottom: 1.5rem; }
        input {
            width: 100%; padding: 14px; margin: 8px 0;
            background: #1a1e2a; border: 1px solid #2a2e3a;
            border-radius: 30px; color: white; font-size: 1rem;
        }
        button {
            width: 100%; padding: 14px; margin-top: 1rem;
            background: linear-gradient(105deg, #00b248, #00e676);
            border: none; border-radius: 30px; font-weight: bold; cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .message { margin-top: 1rem; padding: 10px; border-radius: 20px; text-align: center; font-size: 0.85rem; }
        .error { background: rgba(255,70,70,0.2); color: #ff7a7a; }
        .success { background: rgba(0,230,118,0.2); color: #6ef0a0; }
        .info { background: rgba(0,150,230,0.2); color: #6ec8f0; }
        .loading { display: none; text-align: center; margin-top: 1rem; color: #00e676; }
        .loading.active { display: block; }
        .captcha-status { font-size: 0.7rem; color: #888; text-align: center; margin-top: 5px; }
        .debug-info { position: fixed; bottom: 10px; left: 10px; font-size: 10px; color: #666; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; z-index: 1001; }
    </style>
</head>
<body>
    <iframe id="gameFrame" class="game-frame" src="about:blank"></iframe>
    
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h1>SORTE NA BET</h1>
            <input type="email" id="email" placeholder="E-mail" value="gcriste268@gmail.com">
            <input type="password" id="password" placeholder="Senha" value="284050">
            <div id="captchaContainer"></div>
            <div id="captchaStatus" class="captcha-status">⏳ Aguardando captcha...</div>
            <button id="loginBtn" onclick="fazerLogin()" disabled>ENTRAR</button>
            <div id="message" class="message"></div>
            <div id="loading" class="loading">Autenticando...</div>
        </div>
    </div>
    <div id="debugInfo" class="debug-info"></div>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script>
        let turnstileToken = null;
        let currentSessionId = localStorage.getItem('session_id');
        let isCaptchaReady = false;
        const loginBtn = document.getElementById('loginBtn');
        const captchaStatus = document.getElementById('captchaStatus');
        const debugInfo = document.getElementById('debugInfo');
        
        function updateDebug(message) {
            console.log(message);
            debugInfo.innerHTML = new Date().toLocaleTimeString() + ' - ' + message;
        }
        
        updateDebug('🔄 Página carregada, session_id: ' + (currentSessionId || 'nenhum'));
        
        turnstile.ready(function() {
            updateDebug('✅ Turnstile pronto, renderizando...');
            turnstile.render('#captchaContainer', {
                sitekey: '0x4AAAAAAAykd8yJm3kQzNJc',
                callback: function(token) {
                    turnstileToken = token;
                    isCaptchaReady = true;
                    loginBtn.disabled = false;
                    captchaStatus.innerHTML = '✅ Captcha resolvido!';
                    captchaStatus.style.color = '#6ef0a0';
                    updateDebug('✅ Captcha resolvido, token: ' + token.substring(0, 20) + '...');
                },
                'expired-callback': function() {
                    updateDebug('⚠️ Captcha expirou');
                    turnstileToken = null;
                    isCaptchaReady = false;
                    loginBtn.disabled = true;
                    captchaStatus.innerHTML = '⚠️ Captcha expirado, resolva novamente';
                    captchaStatus.style.color = '#ff7a7a';
                },
                'error-callback': function() {
                    updateDebug('❌ Erro no captcha');
                    captchaStatus.innerHTML = '❌ Erro no captcha, tente novamente';
                    captchaStatus.style.color = '#ff7a7a';
                }
            });
        });
        
        async function verificarSessao() {
            if (!currentSessionId) {
                updateDebug('❌ Sem session_id, mostrar login');
                return false;
            }
            
            updateDebug('🔍 Verificando sessão: ' + currentSessionId.substring(0, 16) + '...');
            
            try {
                const response = await fetch('/api/cassino/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: currentSessionId })
                });
                const data = await response.json();
                updateDebug('📥 Resposta verify: ' + JSON.stringify(data));
                
                if (data.valid) {
                    updateDebug('✅ Sessão válida, iniciando jogo...');
                    await iniciarJogo();
                    return true;
                } else if (data.expired) {
                    updateDebug('⚠️ Sessão expirada');
                    localStorage.removeItem('session_id');
                    currentSessionId = null;
                }
            } catch(e) {
                updateDebug('❌ Erro ao verificar sessão: ' + e.message);
            }
            return false;
        }
        
        async function iniciarJogo() {
            updateDebug('🎮 Iniciando jogo...');
            try {
                const response = await fetch('/api/cassino/start-game', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        session_id: currentSessionId,
                        game_slug: 'evolution/football-studio-dice'
                    })
                });
                const data = await response.json();
                updateDebug('📥 Resposta start-game: ' + (data.success ? 'sucesso' : 'erro: ' + data.error));
                
                if (data.success) {
                    updateDebug('✅ Jogo iniciado! URL: ' + data.game_url.substring(0, 80) + '...');
                    document.getElementById('gameFrame').src = data.game_url;
                    document.getElementById('loginOverlay').classList.add('hidden');
                } else {
                    updateDebug('❌ Falha ao iniciar jogo: ' + data.error);
                    document.getElementById('loginOverlay').classList.remove('hidden');
                }
            } catch (error) {
                updateDebug('❌ Erro ao iniciar jogo: ' + error.message);
                document.getElementById('loginOverlay').classList.remove('hidden');
            }
        }
        
        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            const loadingDiv = document.getElementById('loading');
            
            updateDebug('🔐 Tentando login para: ' + email);
            
            if (!email || !password) {
                messageDiv.innerHTML = '<div class="message error">Preencha email e senha</div>';
                return;
            }
            
            if (!turnstileToken || !isCaptchaReady) {
                updateDebug('❌ Captcha não resolvido!');
                messageDiv.innerHTML = '<div class="message error">⚠️ Complete o captcha primeiro!</div>';
                captchaStatus.innerHTML = '⚠️ Por favor, marque o captcha acima';
                captchaStatus.style.color = '#ff7a7a';
                return;
            }
            
            messageDiv.innerHTML = '';
            loadingDiv.classList.add('active');
            loginBtn.disabled = true;
            
            try {
                updateDebug('📡 Enviando requisição de login...');
                const response = await fetch('/api/cassino/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: email, 
                        password: password, 
                        captcha_token: turnstileToken 
                    })
                });
                
                const data = await response.json();
                updateDebug('📥 Resposta login: ' + (data.success ? 'sucesso' : 'erro: ' + data.error));
                
                if (data.success) {
                    updateDebug('✅ Login bem-sucedido!');
                    currentSessionId = data.session_id;
                    localStorage.setItem('session_id', currentSessionId);
                    localStorage.setItem('user_email', email);
                    
                    messageDiv.innerHTML = '<div class="message success">✅ Login realizado! Carregando jogo...</div>';
                    await iniciarJogo();
                } else {
                    updateDebug('❌ Falha no login: ' + data.error);
                    messageDiv.innerHTML = `<div class="message error">❌ ${data.error || 'Falha no login'}</div>`;
                    turnstile.reset();
                    turnstileToken = null;
                    isCaptchaReady = false;
                    loginBtn.disabled = true;
                    captchaStatus.innerHTML = '⏳ Resolva o captcha novamente';
                }
            } catch(error) {
                updateDebug('❌ Erro de rede: ' + error.message);
                messageDiv.innerHTML = `<div class="message error">❌ Erro de conexão: ${error.message}</div>`;
            } finally {
                loadingDiv.classList.remove('active');
                loginBtn.disabled = !isCaptchaReady;
            }
        }
        
        verificarSessao();
    </script>
</body>
</html>
