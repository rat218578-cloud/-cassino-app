<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Login - Playwright App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #00ff88; font-size: 2em; text-shadow: 0 0 20px rgba(0,255,136,0.3); }
        .logo p { color: #888; font-size: 0.9em; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #ccc; margin-bottom: 8px; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #00ff88; background: rgba(255,255,255,0.08); }
        input::placeholder { color: #555; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 10px;
            color: #0a0c12;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,255,136,0.3); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .alert { margin-top: 15px; padding: 12px; border-radius: 10px; display: none; }
        .alert.success { display: block; background: rgba(0,255,136,0.1); border: 1px solid #00ff88; color: #00ff88; }
        .alert.error { display: block; background: rgba(255,68,68,0.1); border: 1px solid #ff4444; color: #ff4444; }
        .alert.info { display: block; background: rgba(68,136,255,0.1); border: 1px solid #4488ff; color: #4488ff; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer { text-align: center; margin-top: 20px; color: #555; font-size: 0.8em; }
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.7em;
            margin-top: 10px;
        }
        .status-badge.success { background: rgba(0,255,136,0.2); color: #00ff88; }
        .status-badge.warning { background: rgba(255,200,0,0.2); color: #ffc800; }
        .game-buttons { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .game-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
            min-width: 100px;
        }
        .game-btn:hover { transform: translateY(-2px); }
        .game-btn.aviator { background: #ff4400; }
        .game-btn.slot { background: #0088ff; }
        .game-btn.live { background: #00cc6a; }
        #gameContainer {
            margin-top: 15px;
            display: none;
            border-radius: 10px;
            overflow: hidden;
        }
        #gameFrame {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 10px;
            background: #000;
        }
        @media (max-width: 480px) { .container { padding: 20px; margin: 10px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🎮 Playwright App</h1>
            <p>Login automático com anti-detecção</p>
            <div class="status-badge" id="tokenStatus">⏳ Verificando tokens...</div>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>📧 E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>🔒 Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="loginBtn">🚀 Entrar</button>
        </form>
        
        <div class="alert" id="alert"></div>
        
        <div id="successPanel" style="display: none; margin-top: 20px;">
            <div style="background: rgba(0,255,136,0.05); border-radius: 10px; padding: 15px;">
                <p style="color: #00ff88;">✅ Login bem-sucedido!</p>
                <p id="userEmail" style="color: #888; font-size: 0.9em;"></p>
                <div class="game-buttons">
                    <button class="game-btn aviator" onclick="carregarJogo('spribe/aviator')">✈️ Aviator</button>
                    <button class="game-btn slot" onclick="carregarJogo('pragmaticplay/mega-roleta')">🎰 Mega Roleta</button>
                    <button class="game-btn live" onclick="carregarJogo('evolution/football-studio-dice')">⚽ Football</button>
                </div>
                <div id="gameContainer">
                    <iframe id="gameFrame" src="about:blank" allow="autoplay; fullscreen; camera; microphone"></iframe>
                </div>
            </div>
        </div>
        
        <div class="footer">
            🔐 Chromium + Anti-Detecção | Tokens em cache por 7 dias
        </div>
    </div>
    
    <script>
        // ========== STATUS DOS TOKENS ==========
        async function verificarTokens() {
            try {
                const response = await fetch('/api/token/status');
                const data = await response.json();
                const badge = document.getElementById('tokenStatus');
                
                if (data.has_access_token && data.has_captcha_token) {
                    badge.textContent = '✅ Tokens válidos (cache)';
                    badge.className = 'status-badge success';
                } else if (data.has_captcha_token) {
                    badge.textContent = '⚠️ Captcha token OK, access token expirado';
                    badge.className = 'status-badge warning';
                } else {
                    badge.textContent = '❌ Sem tokens (será gerado automaticamente)';
                    badge.className = 'status-badge warning';
                }
            } catch(e) {
                console.error('Erro ao verificar tokens:', e);
            }
        }
        
        verificarTokens();
        
        // ========== FORMULÁRIO ==========
        const form = document.getElementById('loginForm');
        const alertDiv = document.getElementById('alert');
        const loginBtn = document.getElementById('loginBtn');
        const successPanel = document.getElementById('successPanel');
        
        function showAlert(message, type) {
            alertDiv.className = `alert ${type}`;
            alertDiv.textContent = message;
            alertDiv.style.display = 'block';
        }
        
        function hideAlert() { alertDiv.style.display = 'none'; }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showAlert('Preencha email e senha!', 'error');
                return;
            }
            
            loginBtn.innerHTML = '<span class="spinner"></span> Entrando...';
            loginBtn.disabled = true;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha: password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('✅ Login bem-sucedido! Token gerado/recuperado.', 'success');
                    document.getElementById('userEmail').textContent = `👤 ${email}`;
                    successPanel.style.display = 'block';
                    localStorage.setItem('access_token', data.access_token);
                    console.log('🎯 Access Token:', data.access_token);
                    verificarTokens();
                } else {
                    showAlert(`❌ ${data.error || 'Erro no login'}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Erro: ${error.message}`, 'error');
            }
            
            loginBtn.innerHTML = '🚀 Entrar';
            loginBtn.disabled = false;
        });
        
        // ========== CARREGAR JOGO ==========
        async function carregarJogo(slug) {
            const gameContainer = document.getElementById('gameContainer');
            const gameFrame = document.getElementById('gameFrame');
            
            gameContainer.style.display = 'block';
            gameFrame.src = 'about:blank';
            showAlert(`🎮 Carregando ${slug}...`, 'info');
            
            try {
                const response = await fetch(`/api/jogo/${slug}`);
                const data = await response.json();
                
                if (data.success) {
                    gameFrame.src = data.url;
                    showAlert(`✅ Jogo carregado!`, 'success');
                } else {
                    showAlert(`❌ ${data.error}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Erro: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
