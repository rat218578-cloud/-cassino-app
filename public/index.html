<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorte na Bet - Football Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #0a0c12; height: 100vh; overflow: hidden; }
        .game-frame { width: 100%; height: 100%; border: none; }
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            transition: 0.3s;
        }
        .login-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .login-card {
            background: linear-gradient(145deg, #13161f, #0b0e16);
            border-radius: 40px; padding: 2rem; width: 90%; max-width: 400px;
            border: 1px solid #00e676;
        }
        .login-card h1 { color: #00e676; text-align: center; margin-bottom: 1.5rem; }
        input {
            width: 100%; padding: 14px; margin: 8px 0;
            background: #1a1e2a; border: 1px solid #2a2e3a;
            border-radius: 30px; color: white; font-size: 1rem;
        }
        button {
            width: 100%; padding: 14px; margin-top: 1rem;
            background: linear-gradient(105deg, #00b248, #00e676);
            border: none; border-radius: 30px; font-weight: bold; cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .message { margin-top: 1rem; padding: 10px; border-radius: 20px; text-align: center; font-size: 0.85rem; }
        .error { background: rgba(255,70,70,0.2); color: #ff7a7a; }
        .success { background: rgba(0,230,118,0.2); color: #6ef0a0; }
        .loading { display: none; text-align: center; margin-top: 1rem; color: #00e676; }
        .loading.active { display: block; }
        .captcha-status { font-size: 0.7rem; color: #888; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <iframe id="gameFrame" class="game-frame" src="about:blank"></iframe>
    
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h1>SORTE NA BET</h1>
            <input type="email" id="email" placeholder="E-mail" value="gcriste268@gmail.com">
            <input type="password" id="password" placeholder="Senha" value="284050">
            <div id="captchaContainer"></div>
            <div id="captchaStatus" class="captcha-status">⏳ Aguardando captcha...</div>
            <button id="loginBtn" disabled>ENTRAR</button>
            <div id="message" class="message"></div>
            <div id="loading" class="loading">Autenticando...</div>
        </div>
    </div>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" crossorigin="anonymous"></script>
    <script>
        let turnstileToken = null;
        let isCaptchaReady = false;
        let accessToken = localStorage.getItem('access_token');
        
        const loginBtn = document.getElementById('loginBtn');
        const captchaStatus = document.getElementById('captchaStatus');
        const overlay = document.getElementById('loginOverlay');
        const gameFrame = document.getElementById('gameFrame');
        const messageDiv = document.getElementById('message');
        const loadingDiv = document.getElementById('loading');

        function showMessage(text, type) {
            messageDiv.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => { if (messageDiv.innerHTML === `<div class="message ${type}">${text}</div>`) messageDiv.innerHTML = ''; }, 5000);
        }

        turnstile.ready(function() {
            turnstile.render('#captchaContainer', {
                sitekey: '0x4AAAAAAAykd8yJm3kQzNJc',
                callback: function(token) {
                    turnstileToken = token;
                    isCaptchaReady = true;
                    loginBtn.disabled = false;
                    captchaStatus.innerHTML = '✅ Captcha resolvido!';
                    captchaStatus.style.color = '#6ef0a0';
                },
                'expired-callback': function() {
                    turnstileToken = null;
                    isCaptchaReady = false;
                    loginBtn.disabled = true;
                    captchaStatus.innerHTML = '⚠️ Captcha expirado';
                    captchaStatus.style.color = '#ff7a7a';
                }
            });
        });

        async function carregarJogo() {
            try {
                const response = await fetch('https://sortenabet.bet.br/api/start-game-v2', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();
                if (data.iframe_url) {
                    gameFrame.src = data.iframe_url;
                    overlay.classList.add('hidden');
                }
            } catch (error) {
                showMessage('Erro ao iniciar jogo', 'error');
            }
        }

        async function verificarSessao() {
            if (!accessToken) {
                overlay.classList.remove('hidden');
                return;
            }
            try {
                const response = await fetch('https://sortenabet.bet.br/auth', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                if (response.ok) {
                    await carregarJogo();
                } else {
                    localStorage.removeItem('access_token');
                    accessToken = null;
                    overlay.classList.remove('hidden');
                }
            } catch(e) {
                overlay.classList.remove('hidden');
            }
        }

        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showMessage('Preencha email e senha', 'error');
                return;
            }
            if (!turnstileToken) {
                showMessage('Complete o captcha', 'error');
                return;
            }
            
            loginBtn.disabled = true;
            loadingDiv.classList.add('active');
            
            try {
                const response = await fetch('https://sortenabet.bet.br/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        login: email,
                        email: email,
                        password: password,
                        app_source: 'web',
                        captcha_token: turnstileToken
                    })
                });
                const data = await response.json();
                
                if (data.access_token) {
                    accessToken = data.access_token;
                    localStorage.setItem('access_token', accessToken);
                    showMessage('Login realizado!', 'success');
                    await carregarJogo();
                } else {
                    showMessage(data.message || 'Falha no login', 'error');
                    turnstile.reset();
                    turnstileToken = null;
                    isCaptchaReady = false;
                    loginBtn.disabled = true;
                    captchaStatus.innerHTML = '⏳ Resolva o captcha novamente';
                }
            } catch (error) {
                showMessage('Erro: ' + error.message, 'error');
            } finally {
                loadingDiv.classList.remove('active');
                if (isCaptchaReady) loginBtn.disabled = false;
            }
        }

        loginBtn.onclick = fazerLogin;
        verificarSessao();
    </script>
</body>
</html>
