<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sorte na Bet - Football Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0c12;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        .game-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
            background: #0a0f1a;
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 0, 0, 0.95), rgba(8, 12, 24, 0.98));
            backdrop-filter: blur(14px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s, visibility 0.4s;
        }

        .login-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .login-card {
            background: linear-gradient(145deg, #13161f, #0b0e16);
            border-radius: 48px;
            padding: 2rem;
            width: 90%;
            max-width: 440px;
            text-align: center;
            border: 1px solid rgba(0, 230, 118, 0.25);
            box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.6);
        }

        .login-card h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #E6F7FF, #00E676, #00B0F0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .badge-cash {
            display: inline-block;
            background: rgba(0, 230, 118, 0.15);
            border-radius: 100px;
            padding: 6px 14px;
            font-size: 0.7rem;
            color: #00e676;
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            color: #b9c2d9;
            margin-bottom: 6px;
            margin-left: 8px;
        }

        .login-card input {
            width: 100%;
            padding: 14px 18px;
            background: #0c0f17;
            border: 1.5px solid #252b3a;
            border-radius: 28px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .login-card input:focus {
            border-color: #00e676;
            box-shadow: 0 0 0 3px rgba(0, 230, 118, 0.25);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: linear-gradient(105deg, #00b248, #00e676);
            border: none;
            border-radius: 60px;
            color: #0a0c12;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.25s;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message-area {
            margin-top: 18px;
            min-height: 48px;
        }

        .error-msg {
            background: rgba(255, 70, 70, 0.12);
            color: #ff7a7a;
            padding: 10px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .success-msg {
            background: rgba(0, 230, 118, 0.12);
            color: #6ef0a0;
            padding: 10px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .info-msg {
            background: rgba(0, 150, 230, 0.12);
            color: #6ec8f0;
            padding: 10px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .loading {
            display: none;
            margin: 16px auto 0;
        }

        .loading.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #252b3a;
            border-top-color: #00e676;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .captcha-status {
            font-size: 0.7rem;
            color: #888;
            text-align: center;
            margin-top: 10px;
        }

        .token-info {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            color: #666;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 10px;
            z-index: 1001;
        }

        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #1e2332cc;
            border: 1px solid rgba(0,230,118,0.4);
            padding: 10px 20px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            z-index: 1002;
            display: none;
        }

        .back-btn.active {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .back-btn:hover {
            background: #ff4444cc;
            border-color: #ff8888;
        }
    </style>
</head>
<body>

    <iframe id="gameFrame" class="game-iframe" src="about:blank"></iframe>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h1>SORTEBET</h1>
            <div class="badge-cash">🎰 Football Studio Dice</div>

            <div class="input-group">
                <label>📧 E-MAIL</label>
                <input type="email" id="username" placeholder="seuemail@exemplo.com" value="gcriste268@gmail.com">
            </div>
            <div class="input-group">
                <label>🔒 SENHA</label>
                <input type="password" id="password" placeholder="••••••••" value="284050">
            </div>

            <div id="captchaContainer"></div>
            <div id="captchaStatus" class="captcha-status">⏳ Aguardando captcha...</div>

            <button class="login-btn" id="loginBtn" disabled>🎰 ENTRAR E JOGAR</button>

            <div id="messageArea" class="message-area"></div>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <span>Validando credenciais...</span>
            </div>
        </div>
    </div>

    <button id="backBtn" class="back-btn">← VOLTAR / TROCAR CONTA</button>
    <div id="tokenInfo" class="token-info"></div>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" crossorigin="anonymous"></script>
    
    <script>
        // ========== VARIÁVEIS ==========
        let turnstileToken = null;
        let isCaptchaReady = false;
        let accessToken = localStorage.getItem('access_token');
        let tokenExpiresAt = localStorage.getItem('token_expires_at');
        
        // ========== ELEMENTOS DOM ==========
        const loginBtn = document.getElementById('loginBtn');
        const captchaStatus = document.getElementById('captchaStatus');
        const overlay = document.getElementById('loginOverlay');
        const backBtn = document.getElementById('backBtn');
        const gameFrame = document.getElementById('gameFrame');
        const messageArea = document.getElementById('messageArea');
        const loadingDiv = document.getElementById('loading');
        const tokenInfo = document.getElementById('tokenInfo');

        // ========== FUNÇÕES AUXILIARES ==========
        function showMessage(text, type) {
            messageArea.innerHTML = `<div class="${type}-msg">${text}</div>`;
            setTimeout(() => {
                if (messageArea.innerHTML === `<div class="${type}-msg">${text}</div>`) {
                    messageArea.innerHTML = '';
                }
            }, 5000);
        }

        function updateTokenInfo() {
            if (tokenExpiresAt) {
                const remaining = Math.max(0, Math.floor((tokenExpiresAt - Date.now()) / 1000 / 60 / 60 / 24));
                tokenInfo.innerHTML = `🔑 Token válido por ${remaining} dias | Expira: ${new Date(tokenExpiresAt).toLocaleDateString()}`;
            } else {
                tokenInfo.innerHTML = '';
            }
        }

        // ========== TURNSTILE (CAPTCHA) ==========
        turnstile.ready(function() {
            turnstile.render('#captchaContainer', {
                sitekey: '0x4AAAAAAAykd8yJm3kQzNJc',
                callback: function(token) {
                    turnstileToken = token;
                    isCaptchaReady = true;
                    loginBtn.disabled = false;
                    captchaStatus.innerHTML = '✅ Captcha resolvido!';
                    captchaStatus.style.color = '#6ef0a0';
                    console.log('✅ Captcha resolvido');
                },
                'expired-callback': function() {
                    turnstileToken = null;
                    isCaptchaReady = false;
                    loginBtn.disabled = true;
                    captchaStatus.innerHTML = '⚠️ Captcha expirado';
                    captchaStatus.style.color = '#ff7a7a';
                    console.log('⚠️ Captcha expirou');
                }
            });
        });

        // ========== CARREGAR IFRAME DO JOGO ==========
        async function carregarJogo() {
            showMessage('🎮 Carregando jogo...', 'info');
            
            try {
                // Faz a requisição DIRETA para a API do cassino
                const response = await fetch('https://sortenabet.bet.br/api/start-game-v2', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                console.log('📥 Resposta start-game:', data);
                
                if (data.iframe_url) {
                    gameFrame.src = data.iframe_url;
                    overlay.classList.add('hidden');
                    backBtn.classList.add('active');
                    showMessage('✅ Jogo carregado!', 'success');
                } else if (data.url) {
                    gameFrame.src = data.url;
                    overlay.classList.add('hidden');
                    backBtn.classList.add('active');
                } else {
                    throw new Error('URL do jogo não encontrada');
                }
            } catch (error) {
                console.error('Erro:', error);
                showMessage('Erro ao carregar jogo: ' + error.message, 'error');
                overlay.classList.remove('hidden');
            }
        }

        // ========== VERIFICAR SESSÃO EXISTENTE ==========
        async function verificarSessao() {
            // Verifica se o token expirou localmente
            if (tokenExpiresAt && Date.now() > parseInt(tokenExpiresAt)) {
                console.log('⏰ Token expirado!');
                localStorage.removeItem('access_token');
                localStorage.removeItem('token_expires_at');
                accessToken = null;
                tokenExpiresAt = null;
                overlay.classList.remove('hidden');
                return;
            }
            
            if (!accessToken) {
                console.log('❌ Sem token');
                overlay.classList.remove('hidden');
                return;
            }
            
            console.log('🔍 Verificando token existente...');
            updateTokenInfo();
            
            try {
                // Verifica se o token é válido
                const response = await fetch('https://sortenabet.bet.br/auth', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                
                if (response.ok) {
                    console.log('✅ Token válido! Carregando jogo...');
                    await carregarJogo();
                } else {
                    console.log('⚠️ Token inválido');
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('token_expires_at');
                    accessToken = null;
                    tokenExpiresAt = null;
                    overlay.classList.remove('hidden');
                }
            } catch(error) {
                console.error('Erro ao verificar:', error);
                overlay.classList.remove('hidden');
            }
        }

        // ========== FAZER LOGIN (REQUISIÇÃO DIRETA) ==========
        async function fazerLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showMessage('Preencha email e senha', 'error');
                return;
            }
            
            if (!turnstileToken || !isCaptchaReady) {
                showMessage('Complete o captcha primeiro', 'error');
                return;
            }
            
            loginBtn.disabled = true;
            loadingDiv.classList.add('active');
            messageArea.innerHTML = '';
            
            try {
                console.log('📡 Fazendo login para:', username);
                
                // REQUISIÇÃO DIRETA PARA A API DO CASSINO
                const response = await fetch('https://sortenabet.bet.br/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        login: username,
                        email: username,
                        password: password,
                        app_source: 'web',
                        captcha_token: turnstileToken
                    })
                });
                
                const data = await response.json();
                console.log('📥 Resposta:', data);
                
                if (data.access_token) {
                    // Salva o token por 7 dias
                    accessToken = data.access_token;
                    tokenExpiresAt = Date.now() + (7 * 24 * 60 * 60 * 1000);
                    localStorage.setItem('access_token', accessToken);
                    localStorage.setItem('token_expires_at', tokenExpiresAt);
                    
                    showMessage('✅ Login realizado! Token válido por 7 dias', 'success');
                    updateTokenInfo();
                    
                    // Carrega o jogo
                    await carregarJogo();
                } else {
                    showMessage(data.message || 'Falha no login', 'error');
                    // Reseta o captcha
                    turnstile.reset();
                    turnstileToken = null;
                    isCaptchaReady = false;
                    loginBtn.disabled = true;
                    captchaStatus.innerHTML = '⏳ Resolva o captcha novamente';
                    captchaStatus.style.color = '#888';
                }
            } catch (error) {
                console.error('Erro:', error);
                showMessage('Erro de conexão: ' + error.message, 'error');
            } finally {
                loadingDiv.classList.remove('active');
                if (isCaptchaReady) loginBtn.disabled = false;
            }
        }

        // ========== RESETAR (TROCAR CONTA) ==========
        function resetToLogin() {
            gameFrame.src = 'about:blank';
            overlay.classList.remove('hidden');
            backBtn.classList.remove('active');
            localStorage.removeItem('access_token');
            localStorage.removeItem('token_expires_at');
            accessToken = null;
            tokenExpiresAt = null;
            turnstile.reset();
            turnstileToken = null;
            isCaptchaReady = false;
            loginBtn.disabled = true;
            captchaStatus.innerHTML = '⏳ Aguardando captcha...';
            captchaStatus.style.color = '#888';
            messageArea.innerHTML = '';
            tokenInfo.innerHTML = '';
            showMessage('Sessão encerrada', 'info');
        }

        // ========== EVENTOS ==========
        loginBtn.onclick = fazerLogin;
        backBtn.onclick = resetToLogin;
        
        // ========== INICIALIZAR ==========
        verificarSessao();
    </script>
</body>
</html>
