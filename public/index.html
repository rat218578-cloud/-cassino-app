<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Studio - Teste</title>
    <style>
        body { font-family: system-ui; background: #0a0c12; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #13161f; padding: 2rem; border-radius: 32px; max-width: 500px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 28px; border: none; }
        input { background: #0c0f17; color: white; }
        button { background: #00e676; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.5; }
        .error { color: #ff7a7a; }
        .success { color: #00e676; }
        .info { color: #ffb74d; }
        pre { background: #0c0f17; padding: 1rem; border-radius: 16px; overflow-x: auto; font-size: 11px; text-align: left; }
    </style>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <div class="container">
        <h1>⚽ Football Studio</h1>
        
        <input type="email" id="email" placeholder="Email" value="gcriste268@gmail.com">
        <input type="password" id="password" placeholder="Senha" value="284050">
        
        <div class="cf-turnstile" data-sitekey="0x4AAAAAAAykd8yJm3kQzNJc" data-callback="onCaptchaSuccess"></div>
        
        <button id="loginBtn" disabled>🎮 ENTRAR</button>
        
        <div id="message"></div>
        <pre id="debug"></pre>
    </div>

    <script>
        let captchaToken = null;
        
        function onCaptchaSuccess(token) {
            captchaToken = token;
            document.getElementById('loginBtn').disabled = false;
            document.getElementById('message').innerHTML = '<div class="success">✅ Captcha resolvido!</div>';
        }
        
        async function testServer() {
            try {
                const response = await fetch('/api/test');
                const data = await response.json();
                document.getElementById('debug').innerHTML = `✅ Servidor OK: ${JSON.stringify(data, null, 2)}`;
                return true;
            } catch (error) {
                document.getElementById('debug').innerHTML = `❌ Servidor offline: ${error.message}`;
                return false;
            }
        }
        
        async function doLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            if (!email || !password) {
                messageDiv.innerHTML = '<div class="error">⚠️ Preencha email e senha</div>';
                return;
            }
            
            if (!captchaToken) {
                messageDiv.innerHTML = '<div class="error">⚠️ Resolva o captcha primeiro</div>';
                return;
            }
            
            messageDiv.innerHTML = '<div class="info">🔄 Enviando requisição...</div>';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        captcha_token: captchaToken
                    })
                });
                
                const data = await response.json();
                document.getElementById('debug').innerHTML = `📥 Resposta: ${JSON.stringify(data, null, 2)}`;
                
                if (data.success && data.access_token) {
                    messageDiv.innerHTML = '<div class="success">✅ Login realizado com sucesso!</div>';
                    
                    // Pega o jogo
                    const gameResponse = await fetch('/api/game-url', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email, access_token: data.access_token })
                    });
                    
                    const gameData = await gameResponse.json();
                    document.getElementById('debug').innerHTML += `\n\n🎮 Jogo: ${JSON.stringify(gameData, null, 2)}`;
                    
                    if (gameData.success && gameData.gameURL) {
                        messageDiv.innerHTML = '<div class="success">✅ Jogo carregado! Abrindo...</div>';
                        window.open(gameData.gameURL, '_blank');
                    }
                } else {
                    messageDiv.innerHTML = '<div class="error">❌ ' + (data.error || 'Falha no login') + '</div>';
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="error">❌ Erro: ' + error.message + '</div>';
            }
        }
        
        document.getElementById('loginBtn').onclick = doLogin;
        testServer(); // Testa se o servidor está rodando
    </script>
</body>
</html>
