<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sorte na Bet - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #0a0c12;
            height: 100vh;
            overflow: hidden;
        }
        .game-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: 0.3s;
        }
        .login-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .login-card {
            background: linear-gradient(145deg, #13161f, #0b0e16);
            border-radius: 40px;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            border: 1px solid #00e676;
        }
        .login-card h1 {
            color: #00e676;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: #1a1e2a;
            border: 1px solid #2a2e3a;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 1rem;
            background: linear-gradient(105deg, #00b248, #00e676);
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .message {
            margin-top: 1rem;
            padding: 10px;
            border-radius: 20px;
            text-align: center;
            font-size: 0.85rem;
        }
        .error { background: rgba(255,70,70,0.2); color: #ff7a7a; }
        .success { background: rgba(0,230,118,0.2); color: #6ef0a0; }
        .loading { display: none; text-align: center; margin-top: 1rem; color: #00e676; }
        .loading.active { display: block; }
    </style>
</head>
<body>
    <iframe id="gameFrame" class="game-frame" src="about:blank"></iframe>
    
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h1>SORTE NA BET</h1>
            <input type="email" id="email" placeholder="E-mail" value="gcriste268@gmail.com">
            <input type="password" id="password" placeholder="Senha" value="284050">
            <div id="captchaContainer"></div>
            <button onclick="fazerLogin()">ENTRAR</button>
            <div id="message" class="message"></div>
            <div id="loading" class="loading">Autenticando...</div>
        </div>
    </div>

    <!-- Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <script>
        let turnstileToken = null;
        
        // Inicializa Turnstile
        turnstile.ready(function() {
            turnstile.render('#captchaContainer', {
                sitekey: '0x4AAAAAAAykd8yJm3kQzNJc',
                callback: function(token) {
                    turnstileToken = token;
                    console.log('✅ Captcha resolvido:', token);
                }
            });
        });
        
        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            const loadingDiv = document.getElementById('loading');
            
            if (!email || !password) {
                messageDiv.innerHTML = '<div class="message error">Preencha email e senha</div>';
                return;
            }
            
            if (!turnstileToken) {
                messageDiv.innerHTML = '<div class="message error">Complete o captcha primeiro</div>';
                return;
            }
            
            messageDiv.innerHTML = '';
            loadingDiv.classList.add('active');
            
            try {
                const response = await fetch('/api/cassino/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        captcha_token: turnstileToken
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.innerHTML = '<div class="message success">✅ Login realizado! Carregando jogo...</div>';
                    
                    // Salva tokens
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('evo_session', data.evo_session_id);
                    
                    setTimeout(() => {
                        document.getElementById('gameFrame').src = data.game_url;
                        document.getElementById('loginOverlay').classList.add('hidden');
                    }, 1500);
                } else {
                    messageDiv.innerHTML = `<div class="message error">❌ ${data.error || 'Falha no login'}</div>`;
                    turnstile.reset();
                    turnstileToken = null;
                }
            } catch (error) {
                messageDiv.innerHTML = `<div class="message error">❌ Erro: ${error.message}</div>`;
            } finally {
                loadingDiv.classList.remove('active');
            }
        }
    </script>
</body>
</html>
